<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER 71 ENAFUL - Bot Maker Engine</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --btn-purple: #8957e5;
            --btn-green: #238636;
            --btn-red: #da3633;
            --text-main: #ffffff;
            --text-sub: #f3c68f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            background-image: linear-gradient(rgba(18, 18, 18, 0.8), rgba(18, 18, 18, 0.8)), url('https://i.supaimg.com/d8919cc0-dc9c-41e0-9c14-2ff75835e603/dd8de9f6-0a00-4dac-8477-2d4f43119bc6.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
        }

        .header-box {
            background: rgba(22, 27, 34, 0.8);
            border-left: 4px solid #8957e5;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-box h2 { margin: 0 0 5px 0; color: #4ea8de; font-size: 18px; }
        .header-box p { margin: 0; color: var(--text-sub); font-weight: bold; font-size: 14px; }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
            text-align: center;
            box-sizing: border-box;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:active { transform: scale(0.97); }

        .purple { background: linear-gradient(135deg, #8957e5, #6f42c1); }
        .green { background: linear-gradient(135deg, #238636, #2ea44f); }
        .red { background: linear-gradient(135deg, #da3633, #b62b28); }
        .white-btn { background: #ffffff; color: #000000; margin-top: 15px; }
        .cancel-btn { background: rgba(218, 54, 51, 0.2); border: 1px solid var(--btn-red); color: #ff6b6b; }

        .form-panel {
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            display: none;
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .form-panel label.input-label {
            display: block;
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            background-color: #010409;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 12px;
        }

        .input-field:focus { border-color: #58a6ff; outline: none; }

        /* ফিচার সিলেক্টর সেকশন */
        .feature-section {
            margin-top: 15px;
            border-top: 1px solid #30363d;
            padding-top: 15px;
        }

        .feature-title {
            font-size: 14px;
            color: #4ea8de;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            background: rgba(1, 4, 9, 0.5);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #21262d;
            cursor: pointer;
        }

        .feature-item input {
            margin-right: 12px;
            transform: scale(1.2);
            accent-color: #8957e5;
            cursor: pointer;
        }

        .feature-text {
            font-size: 13px;
            color: #c9d1d9;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header-box">
        <h2>🤖 AUTO REACTION BOT MAKER 3</h2>
        <p>OWNER: ENAFUL 💛💛</p>
    </div>

    <button class="btn purple" onclick="sendAction('owner_profile')">👑 OWNER ID: 6823368645</button>
    <button class="btn green" onclick="openForm('admin')">👤 SET CLONE BOT ADMIN</button>
    <button class="btn red" onclick="openForm('token')">🔑 ENTER BOT TOKEN</button>

    <div class="form-panel" id="inputForm">
        <label class="input-label">👤 Admin Telegram ID:</label>
        <input type="text" inputmode="numeric" id="adminIdInput" class="input-field" placeholder="Enter Bot Admin's Telegram ID...">

        <label class="input-label">🔑 Bot Token:</label>
        <input type="text" id="tokenInput" class="input-field" placeholder="Enter Your HTTP Bot Token...">
        
        <div class="feature-section">
            <div class="feature-title">⚙️ SELECT FEATURES TO RUN:</div>
            
            <label class="feature-item">
                <input type="checkbox" id="feat_emojis" checked>
                <span class="feature-text">⚡ 50+ Auto Premium Emojis Support</span>
            </label>
            
            <label class="feature-item">
                <input type="checkbox" id="feat_channel" checked>
                <span class="feature-text">📢 Channel Auto Reaction Mode</span>
            </label>
            
            <label class="feature-item">
                <input type="checkbox" id="feat_group" checked>
                <span class="feature-text">👥 Group Auto Reaction Mode</span>
            </label>
            
            <label class="feature-item">
                <input type="checkbox" id="feat_alert" checked>
                <span class="feature-text">🔔 Live Admin Start Notification</span>
            </label>
        </div>

        <button class="btn white-btn" onclick="deployBotToServer()">🚀 DEPLOY & TRANSMIT FEATURES</button>
        <button class="btn cancel-btn" onclick="closeForm()">❌ CANCEL</button>
    </div>

</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function sendAction(action) {
        if (tg.initDataUnsafe && tg.initDataUnsafe.query_id) {
            fetch('https://api.telegram.org/bot' + tg.initDataUnsafe.bot_types + '/answerWebAppQuery?web_app_query_id=' + tg.initDataUnsafe.query_id, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    type: 'article',
                    id: 'action',
                    title: 'Action',
                    input_message_content: { message_text: action }
                })
            }).then(() => tg.close()).catch(() => { tg.sendData(action); tg.close(); });
        } else {
            tg.sendData(action);
            tg.close();
        }
    }

    function openForm(focusTarget) {
        document.getElementById('inputForm').style.display = 'block';
        if (focusTarget === 'admin') document.getElementById('adminIdInput').focus();
        else if (focusTarget === 'token') document.getElementById('tokenInput').focus();
    }

    function closeForm() {
        document.getElementById('inputForm').style.display = 'none';
    }

    function deployBotToServer() {
        let adminId = document.getElementById('adminIdInput').value.trim();
        let token = document.getElementById('tokenInput').value.trim();
        
        if(!adminId || isNaN(adminId)) {
            alert("Please enter a valid numeric Admin Telegram ID!");
            return;
        }
        if(!token || !token.includes(":")) {
            alert("Please enter a valid Bot Token!");
            return;
        }

        // কোন কোন ফিচার অন করেছে তার ডাটা কালেক্ট করা
        let f_emojis = document.getElementById('feat_emojis').checked ? "1" : "0";
        let f_channel = document.getElementById('feat_channel').checked ? "1" : "0";
        let f_group = document.getElementById('feat_group').checked ? "1" : "0";
        let f_alert = document.getElementById('feat_alert').checked ? "1" : "0";

        // ডাটা স্ট্রাকচার: deploy_clone:টোকেন#এডমিন_আইডি#ইমোজি_চ্যানেল_গ্রুপ_অ্যালার্ট
        let finalData = "deploy_clone:" + token + "#" + adminId + "#" + f_emojis + f_channel + f_group + f_alert;

        if (tg.initDataUnsafe && tg.initDataUnsafe.query_id) {
            fetch(`https://api.telegram.org/bot${token}/answerWebAppQuery`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    web_app_query_id: tg.initDataUnsafe.query_id,
                    result: {
                        type: 'article',
                        id: 'deploy',
                        title: 'Deploy Clone',
                        input_message_content: {
                            message_text: finalData,
                            parse_mode: 'Markdown'
                        }
                    }
                })
            }).then(() => {
                tg.close();
            }).catch((err) => {
                tg.sendData(finalData);
                tg.close();
            });
        } else {
            tg.sendData(finalData);
            tg.close();
        }
    }
</script>

</body>
</html>
