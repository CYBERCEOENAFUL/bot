<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER 71 ENAFUL - Bot Maker Engine</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --btn-purple: #8957e5;
            --btn-green: #238636;
            --btn-red: #da3633;
            --text-main: #ffffff;
            --text-sub: #f3c68f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            background-image: linear-gradient(rgba(18, 18, 18, 0.8), rgba(18, 18, 18, 0.8)), url('https://i.supaimg.com/d8919cc0-dc9c-41e0-9c14-2ff75835e603/dd8de9f6-0a00-4dac-8477-2d4f43119bc6.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
        }

        .header-box {
            background: rgba(22, 27, 34, 0.8);
            border-left: 4px solid #8957e5;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-box h2 { margin: 0 0 5px 0; color: #4ea8de; font-size: 18px; }
        .header-box p { margin: 0; color: var(--text-sub); font-weight: bold; font-size: 14px; }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
            text-align: center;
            box-sizing: border-box;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:active { transform: scale(0.97); }

        .purple { background: linear-gradient(135deg, #8957e5, #6f42c1); }
        .green { background: linear-gradient(135deg, #238636, #2ea44f); }
        .red { background: linear-gradient(135deg, #da3633, #b62b28); }
        .white-btn { background: #ffffff; color: #000000; margin-top: 5px; }
        .cancel-btn { background: rgba(218, 54, 51, 0.2); border: 1px solid var(--btn-red); color: #ff6b6b; }

        .form-panel {
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            display: none; /* শুরুতে হাইড থাকবে */
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .form-panel label {
            display: block;
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            background-color: #010409;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 12px;
        }

        .input-field:focus {
            border-color: #58a6ff;
            outline: none;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header-box">
        <h2>🤖 AUTO REACTION BOT MAKER 3</h2>
        <p>OWNER: ENAFUL 💛💛</p>
    </div>

    <button class="btn purple" onclick="sendAction('owner_profile')">👑 OWNER ID: 6823368645</button>

    <button class="btn green" onclick="openForm('admin')">👤 SET CLONE BOT ADMIN</button>

    <button class="btn red" onclick="openForm('token')">🔑 ENTER BOT TOKEN</button>

    <div class="form-panel" id="inputForm">
        <label>👤 Admin Telegram ID:</label>
        <input type="text" inputmode="numeric" id="adminIdInput" class="input-field" placeholder="Enter Bot Admin's Telegram ID...">

        <label>🔑 Bot Token:</label>
        <input type="text" id="tokenInput" class="input-field" placeholder="Enter Your HTTP Bot Token...">
        
        <button class="btn white-btn" onclick="deployBotToServer()">🚀 DEPLOY & TRANSMIT FEATURES</button>
        
        <button class="btn cancel-btn" onclick="closeForm()">❌ CANCEL</button>
    </div>

</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function sendAction(action) {
        tg.sendData(action);
        tg.close();
    }

    // স্মার্ট ফর্ম ওপেনিং সিস্টেম
    function openForm(focusTarget) {
        var form = document.getElementById('inputForm');
        form.style.display = 'block';
        
        if (focusTarget === 'admin') {
            document.getElementById('adminIdInput').focus();
        } else if (focusTarget === 'token') {
            document.getElementById('tokenInput').focus();
        }
    }

    function closeForm() {
        document.getElementById('inputForm').style.display = 'none';
    }

    function deployBotToServer() {
        let adminId = document.getElementById('adminIdInput').value.trim();
        let token = document.getElementById('tokenInput').value.trim();
        
        // আইডি শুধুমাত্র সংখ্যা কিনা তা যাচাই করা
        if(!adminId || isNaN(adminId)) {
            alert("Please enter a valid numeric Admin Telegram ID!");
            return;
        }
        if(!token || !token.includes(":")) {
            alert("Please enter a valid Bot Token (e.g. 123456:ABC...)!");
            return;
        }

        tg.sendData("deploy_clone:" + token + "#" + adminId);
        tg.close();
    }
</script>

</body>
</html>
